<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wwwOK - 代理管理面板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --darker: #020617;
            --gray: #334155;
            --light: #f1f5f9;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            min-height: 100vh;
            color: var(--text);
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo span {
            font-size: 14px;
            color: var(--text-dim);
        }
        
        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .stat-card .icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 15px;
        }
        
        .stat-card.users .icon { background: rgba(99, 102, 241, 0.2); color: var(--primary); }
        .stat-card.nodes .icon { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .stat-card.bandwidth .icon { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .stat-card.online .icon { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        
        .stat-card h3 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .stat-card p {
            color: var(--text-dim);
            font-size: 14px;
        }
        
        /* Panel */
        .panel {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
        }
        
        .panel-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .panel-body {
            padding: 25px;
        }
        
        /* Table */
        .table-wrapper {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        th {
            font-weight: 600;
            color: var(--text-dim);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        tr:hover {
            background: rgba(99, 102, 241, 0.05);
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-badge.active {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }
        
        .status-badge.expired {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }
        
        .status-badge.disabled {
            background: rgba(100, 116, 139, 0.15);
            color: var(--text-dim);
        }
        
        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
        
        .btn-success {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            color: white;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, var(--danger) 0%, #dc2626 100%);
            color: white;
        }
        
        .btn-secondary {
            background: var(--gray);
            color: white;
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .btn-icon {
            width: 36px;
            height: 36px;
            padding: 0;
            justify-content: center;
            border-radius: 8px;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background: var(--dark);
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: scale(0.9);
            transition: transform 0.3s;
        }
        
        .modal-overlay.active .modal {
            transform: scale(1);
        }
        
        .modal-header {
            padding: 20px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h3 {
            font-size: 18px;
        }
        
        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-body {
            padding: 25px;
        }
        
        /* Form */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-dim);
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text);
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        /* Links Display */
        .links-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .link-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .link-item:last-child {
            border-bottom: none;
        }
        
        .link-item .protocol {
            width: 80px;
            font-weight: 600;
            font-size: 13px;
        }
        
        .link-item.ss .protocol { color: #20bd5f; }
        .link-item.vmess .protocol { color: #4b5cc4; }
        .link-item.trojan .protocol { color: #8b5cf6; }
        .link-item.vless .protocol { color: #f59e0b; }
        
        .link-item .url-input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text);
            font-family: monospace;
            font-size: 12px;
        }
        
        .link-item .qr-btn,
        .link-item .copy-btn {
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        
        .link-item .copy-btn {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
        }
        
        .link-item .qr-btn {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }
        
        .link-item .copy-btn:hover {
            background: var(--primary);
            color: white;
        }
        
        .link-item .qr-btn:hover {
            background: var(--success);
            color: white;
        }
        
        /* QR Modal */
        .qr-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .qr-modal.active {
            opacity: 1;
            visibility: visible;
        }
        
        .qr-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
        }
        
        .qr-container canvas {
            border-radius: 10px;
        }
        
        .qr-container p {
            margin-top: 15px;
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }
        
        .qr-close {
            margin-top: 20px;
            padding: 10px 30px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }
        
        .tab {
            padding: 12px 24px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .tab.active {
            background: var(--primary);
            color: white;
        }
        
        .tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
        }
        
        /* Progress bar */
        .flow-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }
        
        .flow-bar .fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        .flow-bar .fill.low { background: var(--success); }
        .flow-bar .fill.medium { background: var(--warning); }
        .flow-bar .fill.high { background: var(--danger); }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 12px;
            background: var(--dark);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.3s;
            z-index: 3000;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }
        
        .toast.success .toast-icon { color: var(--success); }
        .toast.error .toast-icon { color: var(--danger); }
        
        /* Subscription */
        .sub-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .sub-box h4 {
            margin-bottom: 15px;
            color: var(--text-dim);
            font-size: 13px;
        }
        
        .sub-url {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .sub-url input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text);
            font-family: monospace;
            font-size: 13px;
        }
        
        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
            
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .link-item {
                flex-direction: column;
                align-items: stretch;
            }
            
            .link-item .url-input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-globe"></i>
                </div>
                <div>
                    <h1>wwwOK</h1>
                    <span>sing-box 代理管理面板</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="showNodeModal()">
                    <i class="fas fa-server"></i> 添加节点
                </button>
                <button class="btn btn-primary" onclick="showUserModal()">
                    <i class="fas fa-user-plus"></i> 添加用户
                </button>
            </div>
        </header>
        
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card users">
                <div class="icon"><i class="fas fa-users"></i></div>
                <h3 id="totalUsers">0</h3>
                <p>总用户数</p>
            </div>
            <div class="stat-card nodes">
                <div class="icon"><i class="fas fa-server"></i></div>
                <h3 id="totalNodes">0</h3>
                <p>节点数量</p>
            </div>
            <div class="stat-card bandwidth">
                <div class="icon"><i class="fas fa-chart-pie"></i></div>
                <h3 id="totalBandwidth">0 TB</h3>
                <p>总流量</p>
            </div>
            <div class="stat-card online">
                <div class="icon"><i class="fas fa-signal"></i></div>
                <h3 id="onlineUsers">0</h3>
                <p>在线节点</p>
            </div>
        </div>
        
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="users">
                <i class="fas fa-users"></i> 用户管理
            </button>
            <button class="tab" data-tab="nodes">
                <i class="fas fa-server"></i> 节点管理
            </button>
            <button class="tab" data-tab="settings">
                <i class="fas fa-cog"></i> 系统设置
            </button>
        </div>
        
        <!-- Users Panel -->
        <div class="panel" id="usersPanel">
            <div class="panel-header">
                <div class="panel-title">
                    <i class="fas fa-list"></i> 用户列表
                </div>
                <div>
                    <input type="text" placeholder="搜索用户..." 
                           style="padding: 8px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); 
                                  background: rgba(0,0,0,0.3); color: white; font-size: 13px;"
                           onkeyup="filterUsers(this.value)">
                </div>
            </div>
            <div class="panel-body">
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>用户</th>
                                <th>流量使用</th>
                                <th>到期时间</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="usersTable">
                            <tr><td colspan="5" class="loading"><div class="spinner"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- Nodes Panel -->
        <div class="panel" id="nodesPanel" style="display:none;">
            <div class="panel-header">
                <div class="panel-title">
                    <i class="fas fa-server"></i> 节点列表
                </div>
            </div>
            <div class="panel-body">
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>节点名称</th>
                                <th>地址</th>
                                <th>端口</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="nodesTable">
                            <tr><td colspan="5" class="loading"><div class="spinner"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- Settings Panel -->
        <div class="panel" id="settingsPanel" style="display:none;">
            <div class="panel-header">
                <div class="panel-title">
                    <i class="fas fa-cog"></i> 系统设置
                </div>
            </div>
            <div class="panel-body">
                <div class="form-group">
                    <label>默认流量限制 (GB)</label>
                    <input type="number" id="defaultFlow" value="100">
                </div>
                <div class="form-group">
                    <label>默认到期天数</label>
                    <input type="number" id="defaultExpire" value="30">
                </div>
                <button class="btn btn-primary" onclick="saveSettings()">
                    <i class="fas fa-save"></i> 保存设置
                </button>
            </div>
        </div>
    </div>
    
    <!-- User Modal -->
    <div class="modal-overlay" id="userModal">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="fas fa-user-plus"></i> 添加用户</h3>
                <button class="modal-close" onclick="closeModal('userModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="newUsername" placeholder="输入用户名">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>流量限制 (GB)</label>
                        <input type="number" id="newFlowLimit" value="100">
                    </div>
                    <div class="form-group">
                        <label>到期天数</label>
                        <input type="number" id="newExpireDays" value="30">
                    </div>
                </div>
                <button class="btn btn-primary" style="width:100%" onclick="createUser()">
                    <i class="fas fa-plus"></i> 创建用户
                </button>
                
                <!-- User Details (after creation) -->
                <div id="userDetails" style="display:none;">
                    <div class="links-box">
                        <h4 style="margin-bottom:15px;color:var(--text-dim);">
                            <i class="fas fa-key"></i> 用户凭证
                        </h4>
                        <p style="margin-bottom:10px;font-size:13px;">
                            <strong>用户名：</strong><span id="detailUsername"></span>
                        </p>
                        <p style="margin-bottom:10px;font-size:13px;">
                            <strong>密码：</strong><span id="detailPassword"></span>
                        </p>
                        
                        <div class="sub-box">
                            <h4><i class="fas fa-link"></i> 订阅链接</h4>
                            <div class="sub-url">
                                <input type="text" id="subUrl" readonly>
                                <button class="btn btn-sm btn-primary" onclick="copySubUrl()">
                                    <i class="fas fa-copy"></i> 复制
                                </button>
                            </div>
                        </div>
                        
                        <div class="links-box">
                            <h4 style="margin-bottom:15px;color:var(--text-dim);">
                                <i class="fas fa-plug"></i> 代理协议链接
                            </h4>
                            <div id="protocolLinks"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Node Modal -->
    <div class="modal-overlay" id="nodeModal">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="fas fa-server"></i> 添加节点</h3>
                <button class="modal-close" onclick="closeModal('nodeModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>节点名称</label>
                    <input type="text" id="newNodeName" placeholder="如：美国VPS-01">
                </div>
                <div class="form-group">
                    <label>节点地址</label>
                    <input type="text" id="newNodeHost" placeholder="如：1.2.3.4 或 node.example.com">
                </div>
                <div class="form-group">
                    <label>端口</label>
                    <input type="number" id="newNodePort" value="8080">
                </div>
                <button class="btn btn-primary" style="width:100%" onclick="createNode()">
                    <i class="fas fa-plus"></i> 添加节点
                </button>
            </div>
        </div>
    </div>
    
    <!-- QR Modal -->
    <div class="qr-modal" id="qrModal">
        <div class="qr-container">
            <canvas id="qrCanvas" width="200" height="200"></canvas>
            <p id="qrProtocol"></p>
            <button class="qr-close" onclick="closeQrModal()">关闭</button>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle toast-icon"></i>
        <span id="toastMsg"></span>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        // API Base URL
        const API = window.location.origin;
        
        // Load data
        async function loadUsers() {
            try {
                const res = await fetch(`${API}/api/users`);
                const data = await res.json();
                renderUsers(data.users || []);
            } catch (e) {
                console.error(e);
            }
        }
        
        async function loadNodes() {
            try {
                const res = await fetch(`${API}/api/nodes`);
                const data = await res.json();
                renderNodes(data.nodes || []);
            } catch (e) {
                console.error(e);
            }
        }
        
        function renderUsers(users) {
            const tbody = document.getElementById('usersTable');
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--text-dim);">暂无用户</td></tr>';
                return;
            }
            
            tbody.innerHTML = users.map(user => {
                const flowPercent = (user.flow_used / user.flow_limit * 100).toFixed(1);
                const flowClass = flowPercent > 80 ? 'high' : flowPercent > 50 ? 'medium' : 'low';
                const status = getUserStatus(user);
                const statusClass = status === '活跃' ? 'active' : status === '已到期' ? 'expired' : 'disabled';
                
                return `
                    <tr>
                        <td>
                            <div class="user-info">
                                <div class="user-avatar">${user.username.charAt(0).toUpperCase()}</div>
                                <div>
                                    <div style="font-weight:500;">${user.username}</div>
                                    <div style="font-size:12px;color:var(--text-dim);">ID: ${user.id}</div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <div style="font-size:13px;">${formatBytes(user.flow_used)} / ${formatBytes(user.flow_limit)}</div>
                            <div class="flow-bar">
                                <div class="fill ${flowClass}" style="width:${flowPercent}%"></div>
                            </div>
                        </td>
                        <td style="font-size:13px;">${user.expire_time ? formatDate(user.expire_time) : '永久'}</td>
                        <td><span class="status-badge ${statusClass}"><i class="fas fa-circle"></i> ${status}</span></td>
                        <td>
                            <button class="btn btn-sm btn-secondary" onclick="viewUser(${user.id})" title="查看详情">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id})" title="删除">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
            
            document.getElementById('totalUsers').textContent = users.length;
        }
        
        function renderNodes(nodes) {
            const tbody = document.getElementById('nodesTable');
            if (nodes.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--text-dim);">暂无节点</td></tr>';
                return;
            }
            
            tbody.innerHTML = nodes.map(node => `
                <tr>
                    <td style="font-weight:500;">${node.name}</td>
                    <td style="font-family:monospace;font-size:13px;">${node.host}</td>
                    <td style="font-family:monospace;">${node.port}</td>
                    <td><span class="status-badge ${node.enable ? 'active' : 'disabled'}">
                        <i class="fas fa-circle"></i> ${node.enable ? '在线' : '离线'}
                    </span></td>
                    <td>
                        <button class="btn btn-sm btn-danger" onclick="deleteNode(${node.id})" title="删除">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
            
            document.getElementById('totalNodes').textContent = nodes.length;
        }
        
        function getUserStatus(user) {
            if (!user.enable) return '已禁用';
            if (user.expire_time && new Date(user.expire_time) < new Date()) return '已到期';
            return '活跃';
        }
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('zh-CN');
        }
        
        // Modal functions
        function showUserModal() {
            document.getElementById('userModal').classList.add('active');
            document.getElementById('userDetails').style.display = 'none';
        }
        
        function showNodeModal() {
            document.getElementById('nodeModal').classList.add('active');
        }
        
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }
        
        // Create user
        async function createUser() {
            const username = document.getElementById('newUsername').value.trim();
            const flowLimit = parseInt(document.getElementById('newFlowLimit').value);
            const expireDays = parseInt(document.getElementById('newExpireDays').value);
            
            if (!username) {
                showToast('请输入用户名', 'error');
                return;
            }
            
            try {
                const res = await fetch(`${API}/api/user/create`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, flow_limit_gb: flowLimit, expire_days: expireDays})
                });
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('userDetails').style.display = 'block';
                    document.getElementById('detailUsername').textContent = data.user.username;
                    document.getElementById('detailPassword').textContent = data.user.password;
                    document.getElementById('subUrl').value = `${API}/subscribe/${data.user.auth_id}`;
                    
                    // Render protocol links
                    const linksDiv = document.getElementById('protocolLinks');
                    linksDiv.innerHTML = '';
                    
                    if (data.user.configs && data.user.configs.length > 0) {
                        const cfg = data.user.configs[0];
                        addProtocolLink(linksDiv, 'SS', cfg.ss);
                        addProtocolLink(linksDiv, 'Vmess', cfg.vmess);
                        addProtocolLink(linksDiv, 'Trojan', cfg.trojan);
                        addProtocolLink(linksDiv, 'VLESS', cfg.vless);
                    }
                    
                    showToast('用户创建成功', 'success');
                    loadUsers();
                } else {
                    showToast(data.error || '创建失败', 'error');
                }
            } catch (e) {
                showToast('创建失败: ' + e.message, 'error');
            }
        }
        
        function addProtocolLink(container, protocol, url) {
            const div = document.createElement('div');
            div.className = `link-item ${protocol.toLowerCase()}`;
            div.innerHTML = `
                <span class="protocol">${protocol}</span>
                <input type="text" class="url-input" value="${url}" readonly>
                <button class="copy-btn" onclick="copyToClipboard('${url}')"><i class="fas fa-copy"></i> 复制</button>
                <button class="qr-btn" onclick="showQR('${url}', '${protocol}')"><i class="fas fa-qrcode"></i></button>
            `;
            container.appendChild(div);
        }
        
        // Create node
        async function createNode() {
            const name = document.getElementById('newNodeName').value.trim();
            const host = document.getElementById('newNodeHost').value.trim();
            const port = parseInt(document.getElementById('newNodePort').value);
            
            if (!name || !host) {
                showToast('请填写完整信息', 'error');
                return;
            }
            
            try {
                const res = await fetch(`${API}/api/node/add`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, host, port})
                });
                const data = await res.json();
                
                if (data.success) {
                    showToast('节点添加成功', 'success');
                    closeModal('nodeModal');
                    loadNodes();
                } else {
                    showToast(data.error || '添加失败', 'error');
                }
            } catch (e) {
                showToast('添加失败: ' + e.message, 'error');
            }
        }
        
        // View user
        async function viewUser(userId) {
            try {
                const res = await fetch(`${API}/api/user/${userId}`);
                const user = await res.json();
                
                document.getElementById('userModal').classList.add('active');
                document.getElementById('userDetails').style.display = 'block';
                document.getElementById('detailUsername').textContent = user.username;
                document.getElementById('detailPassword').textContent = user.password;
                document.getElementById('subUrl').value = `${API}/subscribe/${user.auth_id}`;
                
                const linksDiv = document.getElementById('protocolLinks');
                linksDiv.innerHTML = '';
                
                if (user.configs && user.configs.length > 0) {
                    const cfg = user.configs[0];
                    addProtocolLink(linksDiv, 'SS', cfg.ss);
                    addProtocolLink(linksDiv, 'Vmess', cfg.vmess);
                    addProtocolLink(linksDiv, 'Trojan', cfg.trojan);
                    addProtocolLink(linksDiv, 'VLESS', cfg.vless);
                }
            } catch (e) {
                showToast('获取用户信息失败', 'error');
            }
        }
        
        // Delete user
        async function deleteUser(userId) {
            if (!confirm('确定要删除此用户吗？')) return;
            
            try {
                const res = await fetch(`${API}/api/user/delete/${userId}`, {method: 'POST'});
                const data = await res.json();
                
                if (data.success) {
                    showToast('用户已删除', 'success');
                    loadUsers();
                } else {
                    showToast('删除失败', 'error');
                }
            } catch (e) {
                showToast('删除失败', 'error');
            }
        }
        
        // Delete node
        async function deleteNode(nodeId) {
            if (!confirm('确定要删除此节点吗？')) return;
            // TODO: Implement delete node API
            showToast('节点已删除', 'success');
            loadNodes();
        }
        
        // QR Code
        function showQR(url, protocol) {
            document.getElementById('qrModal').classList.add('active');
            document.getElementById('qrProtocol').textContent = protocol + ' 二维码';
            
            const canvas = document.getElementById('qrCanvas');
            canvas.innerHTML = '';
            new QRCode(canvas, {
                text: url,
                width: 200,
                height: 200
            });
        }
        
        function closeQrModal() {
            document.getElementById('qrModal').classList.remove('active');
        }
        
        // Copy functions
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('已复制到剪贴板', 'success');
            });
        }
        
        function copySubUrl() {
            const url = document.getElementById('subUrl').value;
            copyToClipboard(url);
        }
        
        // Filter users
        function filterUsers(keyword) {
            // Simple client-side filter
            const rows = document.querySelectorAll('#usersTable tr');
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(keyword.toLowerCase()) ? '' : 'none';
            });
        }
        
        // Tabs
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                const tabName = tab.dataset.tab;
                document.getElementById('usersPanel').style.display = tabName === 'users' ? '' : 'none';
                document.getElementById('nodesPanel').style.display = tabName === 'nodes' ? '' : 'none';
                document.getElementById('settingsPanel').style.display = tabName === 'settings' ? '' : 'none';
                
                if (tabName === 'nodes') loadNodes();
            });
        });
        
        // Toast
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Save settings
        function saveSettings() {
            showToast('设置已保存', 'success');
        }
        
        // Init
        loadUsers();
    </script>
</body>
</html>
